<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Costos - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#080f14;color:#e8e4d8;font-family:system-ui,sans-serif;font-size:16px;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    select option{background:#080f14;}
    ::-webkit-scrollbar{width:20px;}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);}
    ::-webkit-scrollbar-thumb{background:rgba(56,189,248,0.5);border-radius:10px;border:4px solid transparent;background-clip:padding-box;}
    ::-webkit-scrollbar-thumb:hover{background:rgba(56,189,248,0.7);background-clip:padding-box;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

var PIN="9876";
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var FB_KEY="gastos-v2";

// Tarifas fijas
var SUELDO_DIA=360;
var PRECIO_HORA_EXTRA=50;
var PRECIO_CENA=55;

var AREAS={
  Persa:{color:"#4ade80",bg:"rgba(74,222,128,0.08)"},
  Slicer:{color:"#38bdf8",bg:"rgba(56,189,248,0.08)"},
  Europeo:{color:"#c084fc",bg:"rgba(192,132,252,0.08)"},
  Morron:{color:"#f59e0b",bg:"rgba(245,158,11,0.08)"},
  Minibel:{color:"#f43f5e",bg:"rgba(244,63,94,0.08)"},
};
var AREA_NAMES=Object.keys(AREAS);
var CONCEPTOS=["Sueldos","Extras","Cenas"];

var PRESENTACIONES={
  Persa:[
    {id:"20lb",label:"20 lb",factor:1},
    {id:"12x1",label:"12x1",factor:1},
    {id:"8x2",label:"8x2",factor:1}
  ],
  Slicer:[
    {id:"36",label:"Caja 36",factor:1},
    {id:"25lb",label:"25 lb",factor:1},
    {id:"19",label:"1/9 bushel",factor:2},
    {id:"24",label:"Caja 24",factor:0.67}
  ],
  Europeo:[
    {id:"12",label:"Caja 12",factor:1},
    {id:"24",label:"Caja 24",factor:2},
    {id:"19",label:"1/9 bushel",factor:4}
  ],
  Morron:[
    {id:"11lb",label:"11 lb",factor:1},
    {id:"19",label:"1/9 bushel",factor:2}
  ],
  Minibel:[
    {id:"12x8oz",label:"12x8oz",factor:6},
    {id:"12x1",label:"12x1",factor:12},
    {id:"18lb",label:"18 lb",factor:18}
  ]
};
function initPres(area){
  var o={};
  (PRESENTACIONES[area]||[]).forEach(function(p){o[p.id]="";});
  return o;
}
function calcBultosBase(area,pres){
  var total=0;
  (PRESENTACIONES[area]||[]).forEach(function(p){
    var cant=nv(pres[p.id]||0);
    total+=cant*p.factor;
  });
  return Math.round(total*100)/100;
}

async function fbGet(k){try{var r=await fetch(FB+"/"+k+".json");return r.ok?await r.json():null;}catch(e){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e2){return null;}}}
async function fbSet(k,v){try{await fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function ni(v){var x=parseInt(v);return isNaN(x)?0:x;}
function r2(n){return Math.round(n*100)/100;}
function fmt(n){return isNaN(n)||!isFinite(n)?"$0.00":"$"+Number(n).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});}
function f1(n){return isNaN(n)||!isFinite(n)?"0.0":Number(n).toFixed(1);}
function hoy(){return new Date().toISOString().split("T")[0];}

function ModalPin(props){
  var s1=useState(""); var v=s1[0]; var sv=s1[1];
  var s2=useState(false); var err=s2[0]; var sErr=s2[1];
  function ok(){if(v===PIN){sv("");sErr(false);props.onOk();}else{sErr(true);sv("");}}
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#0d1f2d",border:"2px solid rgba(56,189,248,0.3)",borderRadius:16,padding:32,maxWidth:300,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:18,fontWeight:900,color:"#f0f0e8",marginBottom:6}}>Acceso requerido</div>
        <div style={{fontSize:13,color:"#4a6a7a",marginBottom:20}}>PIN para registrar costos</div>
        <input type="number" value={v} onChange={function(e){sv(e.target.value.slice(0,8));sErr(false);}} placeholder="PIN"
          style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(err?"#f87171":"rgba(56,189,248,0.3)"),borderRadius:10,padding:"12px",color:"#38bdf8",fontFamily:"Georgia,serif",fontSize:26,textAlign:"center",outline:"none",marginBottom:err?8:16,letterSpacing:6}}/>
        {err&&<div style={{fontSize:13,fontWeight:800,color:"#f87171",marginBottom:12}}>PIN incorrecto</div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={props.onCancel} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
          <button onClick={ok} style={{flex:1,padding:"11px",background:"linear-gradient(135deg,#0369a1,#38bdf8)",border:"none",borderRadius:9,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

function LineChart(props){
  var series=props.series||[]; var height=props.height||120;
  if(!series.length||!series[0].datos.length)return null;
  var allVals=[];
  series.forEach(function(s){s.datos.forEach(function(d){if(d.v>0)allVals.push(d.v);});});
  if(allVals.length<2)return <div style={{textAlign:"center",padding:20,color:"#374151",fontSize:14,fontWeight:700}}>Sin suficientes datos aun</div>;
  var maxV=Math.max.apply(null,allVals);
  var minV=Math.min.apply(null,allVals);
  if(maxV===minV){maxV=maxV*1.1;minV=minV*0.9;}
  var pad={t:16,b:24,l:44,r:12};
  var W=500; var H=height;
  var iW=W-pad.l-pad.r; var iH=H-pad.t-pad.b;
  var gridVals=[minV,minV+(maxV-minV)*0.5,maxV];
  return (
    <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{overflow:"visible"}}>
      {gridVals.map(function(gv,i){
        var y=pad.t+iH*(1-(gv-minV)/(maxV-minV));
        return (
          <g key={i}>
            <line x1={pad.l} y1={y} x2={pad.l+iW} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
            <text x={pad.l-4} y={y+4} textAnchor="end" fontSize="9" fill="#4a6a7a">{fmt(gv).replace("$","$")}</text>
          </g>
        );
      })}
      {series.map(function(s,si){
        var datosReales=s.datos.filter(function(d){return d.v>0;});
        var pts=datosReales.map(function(d,i){
          var x=pad.l+iW*(i/(datosReales.length-1||1));
          var y=pad.t+iH*(1-(d.v-minV)/(maxV-minV||1));
          return{x:x,y:y,v:d.v,label:d.label};
        });
        var path="M"+pts.map(function(p){return p.x+","+p.y;}).join(" L");
        return (
          <g key={si}>
            <path d={path} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinejoin="round"/>
            {pts.map(function(p,i){
              return (
                <g key={i}>
                  <circle cx={p.x} cy={p.y} r="5" fill="#080f14" stroke={s.color} strokeWidth="2"/>
                  <circle cx={p.x} cy={p.y} r="2.5" fill={s.color}/>
                  <text x={p.x} y={H-6} textAnchor="middle" fontSize="8" fill="#4a6a7a">{p.label}</text>
                  <text x={p.x} y={p.y-10} textAnchor="middle" fontSize="8" fill={s.color} fontWeight="700">{fmt(p.v)}</text>
                </g>
              );
            })}
          </g>
        );
      })}
    </svg>
  );
}

function initForm(){
  var f={fecha:hoy(),area:"Persa",trabajadores:"",horasExtra:"",cenas:"",pres:initPres("Persa"),horasTrabajadas:"",rejas:"",observaciones:""};
  return f;
}

function calcular(form){
  var trab=ni(form.trabajadores);
  var hExtra=nv(form.horasExtra);
  var ncenas=ni(form.cenas);
  var bultos=calcBultosBase(form.area,form.pres||{});
  var horas=nv(form.horasTrabajadas);
  var totalSueldos=r2(trab*SUELDO_DIA);
  var totalExtras=r2(hExtra*PRECIO_HORA_EXTRA);
  var totalCenas=r2(ncenas*PRECIO_CENA);
  var totalCosto=r2(totalSueldos+totalExtras+totalCenas);
  var cpb=bultos>0?r2(totalCosto/bultos):0;
  var bxp=trab>0?r2(bultos/trab):0;
  var rejas=nv(form.rejas);
  var bxh=horas>0?r2(bultos/horas):0;
  var rxh=horas>0?r2(rejas/horas):0;
  return{trab:trab,hExtra:hExtra,ncenas:ncenas,bultos:bultos,horas:horas,rejas:rejas,
    totalSueldos:totalSueldos,totalExtras:totalExtras,totalCenas:totalCenas,
    totalCosto:totalCosto,cpb:cpb,bxp:bxp,bxh:bxh,rxh:rxh};
}

function App(){
  var s1=useState("cap"); var tab=s1[0]; var setTab=s1[1];
  var s2=useState([]); var registros=s2[0]; var setRegistros=s2[1];
  var s3=useState(initForm()); var form=s3[0]; var setForm=s3[1];
  var s4=useState(false); var auth=s4[0]; var setAuth=s4[1];
  var s5=useState(false); var showPin=s5[0]; var setShowPin=s5[1];
  var s6=useState(null); var pinCb=s6[0]; var setPinCb=s6[1];
  var s7=useState(null); var openH=s7[0]; var setOpenH=s7[1];
  var s8=useState(false); var mob=s8[0]; var setMob=s8[1];
  var s9=useState(""); var fArea=s9[0]; var setFArea=s9[1];
  var s10=useState(""); var fConcepto=s10[0]; var setFConcepto=s10[1];

  useEffect(function(){
    function resize(){setMob(window.innerWidth<768);}
    resize();
    window.addEventListener("resize",resize);
    return function(){window.removeEventListener("resize",resize);};
  },[]);

  useEffect(function(){
    fbGet(FB_KEY).then(function(d){if(d&&Array.isArray(d))setRegistros(d);});
  },[]);

  function save(v){setRegistros(v);fbSet(FB_KEY,v);}
  function setF(k,v){setForm(function(p){var n=Object.assign({},p);n[k]=v;return n;});}
  function pinReq(cb){if(auth){cb();return;}setPinCb(function(){return cb;});setShowPin(true);}
  function pinOk(){setAuth(true);setShowPin(false);if(pinCb){pinCb();setPinCb(null);}}

  var calc=calcular(form);
  var canSave=form.malla||true;
  var canGuardar=calc.bultos>0&&(calc.trab>0||calc.hExtra>0||calc.ncenas>0);

  function guardar(){
    if(!canGuardar)return;
    var reg={
      id:Date.now(),fecha:form.fecha,area:form.area,
      trabajadores:calc.trab,horasExtra:calc.hExtra,cenas:calc.ncenas,
      bultos:calc.bultos,pres:Object.assign({},form.pres),rejas:calc.rejas,horasTrabajadas:calc.horas,observaciones:form.observaciones||"",
      totalSueldos:calc.totalSueldos,totalExtras:calc.totalExtras,totalCenas:calc.totalCenas,
      totalCosto:calc.totalCosto,cpb:calc.cpb,bxp:calc.bxp,bxh:calc.bxh,rxh:calc.rxh
    };
    save(registros.concat([reg]));
    setForm(initForm());
  }

  // Datos para graficas
  var fechas=[];
  var fSet={};
  registros.forEach(function(r){if(!fSet[r.fecha]){fSet[r.fecha]=true;fechas.push(r.fecha);}});
  fechas.sort();
  var ult14=fechas.slice(-14);

  // Resumen hoy
  var hoyStr=hoy();
  var regHoy=registros.filter(function(r){return r.fecha===hoyStr;});

  // Series CPB por area
  var seriesCPB={};
  AREA_NAMES.forEach(function(a){
    seriesCPB[a]=ult14.map(function(f){
      var rF=registros.filter(function(r){return r.fecha===f&&r.area===a;});
      var totB=rF.reduce(function(s,r){return s+r.bultos;},0);
      var totC=rF.reduce(function(s,r){return s+r.totalCosto;},0);
      return{label:f.slice(5),v:totB>0?r2(totC/totB):0};
    });
  });

  var cfg=AREAS[form.area]||AREAS.Persa;
  var INP={width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"10px 12px",color:"#e8e4d8",fontFamily:"system-ui",fontSize:15,fontWeight:700,outline:"none"};
  var LBL={fontSize:12,color:"#38bdf8",fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,marginBottom:6,display:"block"};
  var FIXED={fontSize:11,color:"#4a6a7a",marginTop:3};

  return (
    <div style={{background:"#080f14",minHeight:"100vh"}}>
      <div style={{background:"rgba(0,0,0,0.85)",borderBottom:"2px solid rgba(56,189,248,0.2)",padding:mob?"0 12px":"0 36px",display:"flex",alignItems:"center",height:mob?54:62,position:"sticky",top:0,zIndex:50}}>
        <div style={{fontSize:mob?15:20,fontWeight:900,color:"#38bdf8",letterSpacing:2,marginRight:mob?8:36}}>COSTOS</div>
        <div style={{display:"flex",flex:1}}>
          {[["cap","CAPTURA"],["dash","DASHBOARD"],["hist","HISTORIAL"]].map(function(item){
            var ac=tab===item[0];
            return (
              <button key={item[0]} onClick={function(){setTab(item[0]);}}
                style={{padding:mob?"0 10px":"0 20px",height:mob?54:62,border:"none",borderBottom:ac?"3px solid #38bdf8":"3px solid transparent",background:"transparent",fontSize:mob?12:14,fontWeight:900,cursor:"pointer",color:ac?"#38bdf8":"#4a6a7a",fontFamily:"system-ui"}}>
                {item[1]}
              </button>
            );
          })}
        </div>
        <button onClick={function(){if(!auth){setShowPin(true);setPinCb(null);}else{setAuth(false);}}}
          style={{padding:mob?"7px 10px":"8px 16px",borderRadius:22,background:auth?"rgba(56,189,248,0.18)":"rgba(255,255,255,0.06)",color:auth?"#38bdf8":"#6b7280",fontWeight:800,fontSize:mob?11:13,cursor:"pointer",border:"2px solid "+(auth?"rgba(56,189,248,0.35)":"rgba(255,255,255,0.12)"),fontFamily:"system-ui"}}>
          {auth?"EDITOR":"LECTOR"}
        </button>
      </div>

      <div style={{maxWidth:1400,margin:"0 auto",padding:mob?"14px 12px 80px":"24px 36px 80px"}}>

      {/* CAPTURA */}
      {tab==="cap"&&(
        <div style={{display:mob?"block":"grid",gridTemplateColumns:"480px 1fr",gap:28}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

            {/* Fecha y area */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <label style={LBL}>Fecha</label>
                  <input style={INP} type="date" value={form.fecha} onChange={function(e){setF("fecha",e.target.value);}}/>
                </div>
                <div>
                  <label style={LBL}>Area</label>
                  <select style={INP} value={form.area} onChange={function(e){
                    var nuevaArea=e.target.value;
                    setForm(function(f){return Object.assign({},f,{area:nuevaArea,pres:initPres(nuevaArea)});});
                  }}>
                    {AREA_NAMES.map(function(a){return <option key={a}>{a}</option>;})}
                  </select>
                </div>
              </div>
            </div>

            {/* Nomina */}
            <div style={{background:cfg.bg,border:"2px solid "+cfg.color+"33",borderRadius:13,padding:"18px"}}>
              <div style={{fontSize:13,fontWeight:900,color:cfg.color,marginBottom:14}}>Nomina - {form.area}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div>
                  <label style={LBL}>Trabajadores</label>
                  <input style={Object.assign({},INP,{fontSize:24,color:cfg.color,textAlign:"center"})} type="number" min="0" placeholder="0" value={form.trabajadores} onChange={function(e){setF("trabajadores",e.target.value);}}/>
                  <div style={FIXED}>$360/dia c/u = {fmt(ni(form.trabajadores)*SUELDO_DIA)}</div>
                </div>
                <div>
                  <label style={LBL}>Horas extra</label>
                  <input style={Object.assign({},INP,{fontSize:24,color:"#fbbf24",textAlign:"center"})} type="number" min="0" step="0.5" placeholder="0" value={form.horasExtra} onChange={function(e){setF("horasExtra",e.target.value);}}/>
                  <div style={FIXED}>$50/hora = {fmt(nv(form.horasExtra)*PRECIO_HORA_EXTRA)}</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <label style={LBL}>Cenas</label>
                  <input style={Object.assign({},INP,{fontSize:24,color:"#fb923c",textAlign:"center"})} type="number" min="0" placeholder="0" value={form.cenas} onChange={function(e){setF("cenas",e.target.value);}}/>
                  <div style={FIXED}>$55/cena = {fmt(ni(form.cenas)*PRECIO_CENA)}</div>
                </div>
                <div style={{background:"rgba(56,189,248,0.08)",border:"2px solid rgba(56,189,248,0.2)",borderRadius:10,padding:"12px",textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#38bdf8",fontWeight:700,marginBottom:6}}>TOTAL COSTO</div>
                  <div style={{fontSize:28,fontWeight:900,color:"#38bdf8",fontFamily:"Georgia,serif"}}>{fmt(calc.totalCosto)}</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,marginTop:8}}>
                    <div style={{fontSize:10,color:"#4a6a7a"}}>Sueldos<br/><span style={{color:"#e8e4d8",fontWeight:700}}>{fmt(calc.totalSueldos)}</span></div>
                    <div style={{fontSize:10,color:"#4a6a7a"}}>Extras<br/><span style={{color:"#fbbf24",fontWeight:700}}>{fmt(calc.totalExtras)}</span></div>
                    <div style={{fontSize:10,color:"#4a6a7a"}}>Cenas<br/><span style={{color:"#fb923c",fontWeight:700}}>{fmt(calc.totalCenas)}</span></div>
                  </div>
                </div>
              </div>
            </div>

            {/* Bultos por presentacion */}
            <div style={{background:cfg.bg,border:"2px solid "+cfg.color+"44",borderRadius:13,padding:"18px"}}>
              <div style={{fontSize:13,fontWeight:900,color:cfg.color,marginBottom:4}}>Bultos empacados - {form.area}</div>
              <div style={{fontSize:11,color:"#4a6a7a",marginBottom:14}}>Se convierten automaticamente a bultos base para el costo</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
                {(PRESENTACIONES[form.area]||[]).map(function(p){
                  var val=(form.pres&&form.pres[p.id])||"";
                  var cant=nv(val);
                  var equiv=Math.round(cant*p.factor*100)/100;
                  return (
                    <div key={p.id} style={{background:"rgba(0,0,0,0.3)",border:"2px solid "+(cant>0?cfg.color+"44":"rgba(255,255,255,0.06)"),borderRadius:10,padding:"12px"}}>
                      <div style={{fontSize:12,fontWeight:800,color:cfg.color,marginBottom:6}}>{p.label}</div>
                      {p.factor!==1&&<div style={{fontSize:10,color:"#4a6a7a",marginBottom:6}}>x{p.factor} = {equiv} base</div>}
                      <input style={Object.assign({},INP,{fontSize:20,color:cfg.color,textAlign:"center"})} type="number" min="0" placeholder="0" value={val}
                        onChange={function(e){setForm(function(f){var np=Object.assign({},f.pres);np[p.id]=e.target.value;return Object.assign({},f,{pres:np});});}}/>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:12,background:cfg.color+"18",border:"1px solid "+cfg.color+"44",borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:14,fontWeight:700,color:cfg.color}}>{form.area==="Minibel"?"Total libras empacadas":"Total bultos base"}</span>
                <span style={{fontSize:20,fontWeight:900,color:cfg.color,fontFamily:"Georgia,serif"}}>{calc.bultos}</span>
              </div>
            </div>

            {/* Produccion */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"18px"}}>
              <div style={{fontSize:13,fontWeight:900,color:"#38bdf8",marginBottom:14}}>Otros datos</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div>
                  <label style={LBL}>Rejas recibidas</label>
                  <input style={Object.assign({},INP,{fontSize:24,color:"#f59e0b",textAlign:"center"})} type="number" min="0" placeholder="0" value={form.rejas} onChange={function(e){setF("rejas",e.target.value);}}/>
                </div>
                <div>
                  <label style={LBL}>Horas trabajadas</label>

                  {fechasA.map(function(f,fi){
                    var rF=rA.filter(function(r){return r.fecha===f;});
                    var totB=rF.reduce(function(s,r){return s+r.bultos;},0);
                    var totC=rF.reduce(function(s,r){return s+r.totalCosto;},0);
                    var totT=rF.reduce(function(s,r){return s+r.trabajadores;},0);
                    var cpb=totB>0?r2(totC/totB):0;
                    var bxp=totT>0?r2(totB/totT):0;
                    var isOpen=openH===a+f;
                    return (
                      <div key={f} style={{borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                        <div onClick={function(){setOpenH(isOpen?null:a+f);}}
                          style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",cursor:"pointer"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:14,fontWeight:800,color:"#f0f0e8"}}>{f}</div>
                            <div style={{fontSize:11,color:"#4a6a7a",marginTop:2}}>{totT} trab . {totB} btos . {f1(bxp)} btos/persona</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:18,fontWeight:900,color:AREAS[a].color,fontFamily:"Georgia,serif"}}>{fmt(cpb)}<span style={{fontSize:10,color:"#4a6a7a"}}>/bto</span></div>
                            <div style={{fontSize:11,color:"#4a6a7a"}}>{fmt(totC)} total</div>
                          </div>
                          <div style={{fontSize:14,color:"#4a6a7a",minWidth:16}}>{isOpen?"-":"+"}</div>
                        </div>
                        {isOpen&&(
                          <div style={{background:"rgba(0,0,0,0.25)",borderRadius:9,padding:"12px 14px",marginBottom:8}}>
                            {rF.map(function(r,ri){
                              return (
                                <div key={ri} style={{borderBottom:ri<rF.length-1?"1px solid rgba(255,255,255,0.06)":"none",paddingBottom:ri<rF.length-1?10:0,marginBottom:ri<rF.length-1?10:0}}>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
                                    <div style={{textAlign:"center"}}>
                                      <div style={{fontSize:9,color:"#4a6a7a"}}>TRAB</div>
                                      <div style={{fontSize:18,fontWeight:700,color:"#e8e4d8"}}>{r.trabajadores}</div>
                                    </div>
                                    <div style={{textAlign:"center"}}>
                                      <div style={{fontSize:9,color:"#4a6a7a"}}>SUELDOS</div>
                                      <div style={{fontSize:14,fontWeight:700,color:"#e8e4d8"}}>{fmt(r.totalSueldos)}</div>
                                    </div>
                                    <div style={{textAlign:"center"}}>
                                      <div style={{fontSize:9,color:"#4a6a7a"}}>EXTRAS</div>
                                      <div style={{fontSize:14,fontWeight:700,color:"#fbbf24"}}>{fmt(r.totalExtras)}</div>
                                    </div>
                                    <div style={{textAlign:"center"}}>
                                      <div style={{fontSize:9,color:"#4a6a7a"}}>CENAS</div>
                                      <div style={{fontSize:14,fontWeight:700,color:"#fb923c"}}>{fmt(r.totalCenas)}</div>
                                    </div>
                                  </div>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:r.observaciones?8:0}}>
                                    <div style={{textAlign:"center",background:"rgba(56,189,248,0.08)",borderRadius:7,padding:"8px"}}>
                                      <div style={{fontSize:9,color:"#4a6a7a"}}>COSTO/BULTO</div>
                                      <div style={{fontSize:16,fontWeight:900,color:"#38bdf8"}}>{fmt(r.cpb)}</div>
                                    </div>
                                    <div style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"8px"}}>
                                      <div style={{fontSize:9,color:"#4a6a7a"}}>BTOS/PERSONA</div>
                                      <div style={{fontSize:16,fontWeight:900,color:AREAS[a].color}}>{f1(r.bxp)}</div>
                                    </div>
                                    <div style={{textAlign:"center",background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"8px"}}>
                                      <div style={{fontSize:9,color:"#4a6a7a"}}>BTOS/HORA</div>
                                      <div style={{fontSize:16,fontWeight:900,color:"#c084fc"}}>{r.bxh>0?f1(r.bxh):"-"}</div>
                                    </div>
                                    <div style={{textAlign:"center",background:"rgba(245,158,11,0.08)",borderRadius:7,padding:"8px"}}>
                                      <div style={{fontSize:9,color:"#f59e0b"}}>REJAS/HORA</div>
                                      <div style={{fontSize:16,fontWeight:900,color:"#f59e0b"}}>{r.rxh>0?f1(r.rxh):"-"}</div>
                                    </div>
                                  </div>
                                  {r.observaciones&&<div style={{fontSize:12,color:"#6b7280",fontStyle:"italic",marginTop:6}}>Obs: {r.observaciones}</div>}
                                  {auth&&<button onClick={function(){pinReq(function(){save(registros.filter(function(reg){return reg.id!==r.id;}));});}} style={{marginTop:8,padding:"5px 12px",background:"transparent",border:"1px solid rgba(248,113,113,0.2)",borderRadius:6,color:"#f87171",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Borrar</button>}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      </div>
      {showPin&&<ModalPin onOk={function(){pinOk();}} onCancel={function(){setShowPin(false);setPinCb(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
