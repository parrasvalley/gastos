<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Costos - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#080f14;color:#e8e4d8;font-family:system-ui,sans-serif;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    select option{background:#080f14;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:rgba(56,189,248,0.3);border-radius:4px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState=React.useState;
var useEffect=React.useEffect;

var PIN="9876";
var FB="https://parrasvalley-default-rtdb.firebaseio.com";
var FB_KEY="gastos-v2";

// Presentaciones por area con factores de conversion a bulto base
var AREAS={
  Persa:{
    color:"#4ade80",
    presentaciones:[
      {id:"20lb",label:"20 lb",factor:1},
      {id:"12x1",label:"12x1",factor:1},
      {id:"8x2",label:"8x2",factor:1}
    ]
  },
  Slicer:{
    color:"#38bdf8",
    presentaciones:[
      {id:"36",label:"Caja 36",factor:1},
      {id:"25lb",label:"25 lb",factor:1},
      {id:"1_9",label:"1/9 bushel",factor:2},
      {id:"24",label:"Caja 24",factor:0.67}
    ]
  },
  Europeo:{
    color:"#c084fc",
    presentaciones:[
      {id:"12",label:"Caja 12",factor:1},
      {id:"24",label:"Caja 24",factor:2},
      {id:"1_9",label:"1/9 bushel (Choice)",factor:4}
    ]
  },
  Morron:{
    color:"#f59e0b",
    presentaciones:[
      {id:"11lb",label:"11 lb",factor:1},
      {id:"1_9",label:"1/9 bushel",factor:2}
    ]
  },
  Minibel:{
    color:"#f43f5e",
    presentaciones:[
      {id:"12x8oz",label:"12x8oz",factor:1},
      {id:"12x1",label:"12x1",factor:2}
    ]
  }
};

var CONCEPTOS=["Sueldos","Extras","Cenas","Otros"];
var AREA_NAMES=Object.keys(AREAS);

async function fbGet(k){try{var r=await fetch(FB+"/"+k+".json");return r.ok?await r.json():null;}catch(e){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e2){return null;}}}
async function fbSet(k,v){try{await fetch(FB+"/"+k+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){}try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function ni(v){var x=parseInt(v);return isNaN(x)?0:x;}
function r2(n){return Math.round(n*100)/100;}
function fmt(n){return isNaN(n)||!isFinite(n)?"$0.00":"$"+n.toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});}
function hoy(){return new Date().toISOString().split("T")[0];}

function ModalPin(props){
  var s1=useState(""); var v=s1[0]; var sv=s1[1];
  var s2=useState(false); var err=s2[0]; var sErr=s2[1];
  function ok(){if(v===PIN){sv("");sErr(false);props.onOk();}else{sErr(true);sv("");}}
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#0d1f2d",border:"2px solid rgba(56,189,248,0.3)",borderRadius:16,padding:32,maxWidth:300,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:18,fontWeight:900,color:"#f0f0e8",marginBottom:6}}>Acceso requerido</div>
        <div style={{fontSize:13,color:"#4a6a7a",marginBottom:20}}>PIN para registrar costos</div>
        <input type="number" value={v} onChange={function(e){sv(e.target.value.slice(0,8));sErr(false);}} placeholder="PIN"
          style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid "+(err?"#f87171":"rgba(56,189,248,0.3)"),borderRadius:10,padding:"12px",color:"#38bdf8",fontFamily:"Georgia,serif",fontSize:26,textAlign:"center",outline:"none",marginBottom:err?8:16,letterSpacing:6}}/>
        {err&&<div style={{fontSize:13,fontWeight:800,color:"#f87171",marginBottom:12}}>PIN incorrecto</div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={props.onCancel} style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:9,color:"#6b7280",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>Cancelar</button>
          <button onClick={ok} style={{flex:1,padding:"11px",background:"linear-gradient(135deg,#0369a1,#38bdf8)",border:"none",borderRadius:9,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

// Mini grafica de barras inline
function MiniBar(props){
  var datos=props.datos||[]; var color=props.color||"#38bdf8"; var altura=props.altura||40;
  if(!datos.length)return null;
  var max=Math.max.apply(null,datos.map(function(d){return d.v;}));
  if(!max)return null;
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:2,height:altura}}>
      {datos.map(function(d,i){
        var h=max>0?Math.round((d.v/max)*altura):0;
        return (
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end"}}>
            <div style={{width:"100%",height:h,background:color,borderRadius:"2px 2px 0 0",opacity:0.8}}/>
          </div>
        );
      })}
    </div>
  );
}

// Grafica de lineas SVG
function LineChart(props){
  var series=props.series||[]; var height=props.height||120; var width=props.width||400;
  if(!series.length||!series[0].datos.length)return <div style={{textAlign:"center",padding:20,color:"#374151",fontSize:12}}>Sin datos suficientes para graficar</div>;
  var allVals=[];
  series.forEach(function(s){s.datos.forEach(function(d){allVals.push(d.v);});});
  var maxV=Math.max.apply(null,allVals)||1;
  var minV=0;
  var pad=30;
  var W=width-pad*2; var H=height-pad*2;
  var labels=series[0].datos.map(function(d){return d.label;});
  return (
    <svg width="100%" viewBox={"0 0 "+width+" "+height} style={{overflow:"visible"}}>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(function(p,i){
        var y=pad+H*(1-p);
        var val=Math.round(minV+(maxV-minV)*p);
        return (
          <g key={i}>
            <line x1={pad} y1={y} x2={pad+W} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
            <text x={pad-4} y={y+4} textAnchor="end" fontSize="8" fill="#4a5568">{val>999?"$"+(val/1000).toFixed(1)+"k":"$"+val}</text>
          </g>
        );
      })}
      {/* Labels eje X */}
      {labels.map(function(l,i){
        var x=pad+W*(i/(labels.length-1||1));
        return <text key={i} x={x} y={height-4} textAnchor="middle" fontSize="8" fill="#4a5568">{l}</text>;
      })}
      {/* Series */}
      {series.map(function(s,si){
        if(!s.datos.length)return null;
        var pts=s.datos.map(function(d,i){
          var x=pad+W*(i/(s.datos.length-1||1));
          var y=pad+H*(1-(d.v-minV)/(maxV-minV||1));
          return x+","+y;
        });
        var path="M"+pts.join(" L");
        return (
          <g key={si}>
            <path d={path} fill="none" stroke={s.color} strokeWidth="2" strokeLinejoin="round"/>
            {s.datos.map(function(d,i){
              var x=pad+W*(i/(s.datos.length-1||1));
              var y=pad+H*(1-(d.v-minV)/(maxV-minV||1));
              return <circle key={i} cx={x} cy={y} r="3" fill={s.color}/>;
            })}
          </g>
        );
      })}
    </svg>
  );
}

function initCaptura(){
  var pres={};
  AREA_NAMES.forEach(function(a){
    pres[a]={};
    AREAS[a].presentaciones.forEach(function(p){pres[a][p.id]="";});
  });
  var costos={};
  AREA_NAMES.forEach(function(a){
    costos[a]={};
    CONCEPTOS.forEach(function(c){costos[a][c]="";});
  });
  return{fecha:hoy(),area:"Persa",pres:pres,costos:costos};
}

function calcBultos(areaName,presVals){
  var total=0;
  (AREAS[areaName].presentaciones||[]).forEach(function(p){
    var cant=nv(presVals[p.id]||0);
    total+=cant*p.factor;
  });
  return r2(total);
}

function calcCostoTotal(areaName,costoVals){
  var total=0;
  CONCEPTOS.forEach(function(c){total+=nv(costoVals[c]||0);});
  return r2(total);
}

function App(){
  var s1=useState("cap"); var tab=s1[0]; var setTab=s1[1];
  var s2=useState([]); var registros=s2[0]; var setRegistros=s2[1];
  var s3=useState(initCaptura()); var cap=s3[0]; var setCap=s3[1];
  var s4=useState(false); var auth=s4[0]; var setAuth=s4[1];
  var s5=useState(false); var showPin=s5[0]; var setShowPin=s5[1];
  var s6=useState(null); var pinCb=s6[0]; var setPinCb=s6[1];
  var s7=useState(null); var openH=s7[0]; var setOpenH=s7[1];
  var s8=useState(false); var mob=s8[0]; var setMob=s8[1];
  var s9=useState(""); var fArea=s9[0]; var setFArea=s9[1];

  useEffect(function(){
    function resize(){setMob(window.innerWidth<768);}
    resize();
    window.addEventListener("resize",resize);
    return function(){window.removeEventListener("resize",resize);};
  },[]);

  useEffect(function(){
    fbGet(FB_KEY).then(function(d){if(d&&Array.isArray(d))setRegistros(d);});
  },[]);

  function save(v){setRegistros(v);fbSet(FB_KEY,v);}

  function pinReq(cb){if(auth){cb();return;}setPinCb(function(){return cb;});setShowPin(true);}
  function pinOk(){setAuth(true);setShowPin(false);if(pinCb){pinCb();setPinCb(null);}}

  var areaActual=cap.area;
  var presActual=cap.pres[areaActual]||{};
  var costosActual=cap.costos[areaActual]||{};
  var bultosActual=calcBultos(areaActual,presActual);
  var costoTotalActual=calcCostoTotal(areaActual,costosActual);
  var costoPorBulto=bultosActual>0?r2(costoTotalActual/bultosActual):0;

  function guardar(){
    if(!bultosActual||!costoTotalActual)return;
    var reg={
      id:Date.now(),
      fecha:cap.fecha,
      area:areaActual,
      presentaciones:Object.assign({},presActual),
      costos:Object.assign({},costosActual),
      bultos:bultosActual,
      costoTotal:costoTotalActual,
      costoPorBulto:costoPorBulto
    };
    save(registros.concat([reg]));
    // Reset solo costos y presentaciones del area actual
    setCap(function(prev){
      var np=Object.assign({},prev.pres);
      np[areaActual]={};
      AREAS[areaActual].presentaciones.forEach(function(p){np[areaActual][p.id]="";});
      var nc=Object.assign({},prev.costos);
      nc[areaActual]={};
      CONCEPTOS.forEach(function(c){nc[areaActual][c]="";});
      return Object.assign({},prev,{pres:np,costos:nc});
    });
  }

  // Procesar datos para graficas
  var fechas=[];
  var fechasSet={};
  registros.forEach(function(r){if(!fechasSet[r.fecha]){fechasSet[r.fecha]=true;fechas.push(r.fecha);}});
  fechas.sort();
  var ultFechas=fechas.slice(-14); // ultimas 2 semanas

  // Series por area para grafica de lineas
  var seriesCPB=AREA_NAMES.map(function(a){
    var datos=ultFechas.map(function(f){
      var regsF=registros.filter(function(r){return r.fecha===f&&r.area===a;});
      var totalB=regsF.reduce(function(s,r){return s+r.bultos;},0);
      var totalC=regsF.reduce(function(s,r){return s+r.costoTotal;},0);
      return{label:f.slice(5),v:totalB>0?r2(totalC/totalB):0};
    });
    return{label:a,color:AREAS[a].color,datos:datos};
  });

  // Resumen hoy
  var hoyStr=hoy();
  var regHoy=registros.filter(function(r){return r.fecha===hoyStr;});
  var resumenHoy={};
  AREA_NAMES.forEach(function(a){
    var regsA=regHoy.filter(function(r){return r.area===a;});
    if(!regsA.length)return;
    var totB=regsA.reduce(function(s,r){return s+r.bultos;},0);
    var totC=regsA.reduce(function(s,r){return s+r.costoTotal;},0);
    resumenHoy[a]={bultos:totB,costo:totC,cpb:totB>0?r2(totC/totB):0};
  });

  // Historial agrupado por fecha
  var histFechas=fechas.slice().reverse();

  var INP={width:"100%",background:"rgba(0,0,0,0.4)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:"#e8e4d8",fontFamily:"system-ui",fontSize:15,fontWeight:700,outline:"none"};
  var LBL={fontSize:10,color:"#38bdf8",fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,marginBottom:5,display:"block"};
  var cfgA=AREAS[areaActual]||AREAS.Persa;

  return (
    <div style={{background:"#080f14",minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:"rgba(0,0,0,0.8)",borderBottom:"2px solid rgba(56,189,248,0.2)",padding:mob?"0 12px":"0 36px",display:"flex",alignItems:"center",height:mob?54:62,position:"sticky",top:0,zIndex:50}}>
        <div style={{fontSize:mob?15:20,fontWeight:900,color:"#38bdf8",letterSpacing:2,marginRight:mob?8:36}}>COSTOS</div>
        <div style={{display:"flex",flex:1}}>
          {[["cap","CAPTURA"],["dash","DASHBOARD"],["hist","HISTORIAL"]].map(function(item){
            var ac=tab===item[0];
            return (
              <button key={item[0]} onClick={function(){setTab(item[0]);}}
                style={{padding:mob?"0 10px":"0 20px",height:mob?54:62,border:"none",borderBottom:ac?"3px solid #38bdf8":"3px solid transparent",background:"transparent",fontSize:mob?12:14,fontWeight:900,cursor:"pointer",color:ac?"#38bdf8":"#4a6a7a",fontFamily:"system-ui"}}>
                {item[1]}
              </button>
            );
          })}
        </div>
        <button onClick={function(){if(!auth){setShowPin(true);setPinCb(null);}else{setAuth(false);}}}
          style={{padding:mob?"7px 10px":"8px 16px",borderRadius:22,background:auth?"rgba(56,189,248,0.18)":"rgba(255,255,255,0.06)",color:auth?"#38bdf8":"#6b7280",fontWeight:800,fontSize:mob?11:13,cursor:"pointer",border:"2px solid "+(auth?"rgba(56,189,248,0.35)":"rgba(255,255,255,0.12)"),fontFamily:"system-ui"}}>
          {auth?"EDITOR":"LECTOR"}
        </button>
      </div>

      <div style={{maxWidth:1400,margin:"0 auto",padding:mob?"14px 12px 80px":"24px 36px 80px"}}>

      {/* CAPTURA */}
      {tab==="cap"&&(
        <div style={{display:mob?"block":"grid",gridTemplateColumns:"480px 1fr",gap:24}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

            {/* Fecha y area */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div>
                  <label style={LBL}>Fecha</label>
                  <input style={INP} type="date" value={cap.fecha} onChange={function(e){setCap(function(p){return Object.assign({},p,{fecha:e.target.value});});}}/>
                </div>
                <div>
                  <label style={LBL}>Area</label>
                  <select style={INP} value={cap.area} onChange={function(e){setCap(function(p){return Object.assign({},p,{area:e.target.value});});}}>
                    {AREA_NAMES.map(function(a){return <option key={a}>{a}</option>;})}
                  </select>
                </div>
              </div>
            </div>

            {/* Presentaciones / Bultos */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid "+cfgA.color+"44",borderRadius:13,padding:"18px"}}>
              <div style={{fontSize:13,fontWeight:900,color:cfgA.color,textTransform:"uppercase",letterSpacing:2,marginBottom:14}}>Bultos empacados - {areaActual}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
                {cfgA.presentaciones.map(function(p){
                  var val=presActual[p.id]||"";
                  var cant=nv(val);
                  var equiv=r2(cant*p.factor);
                  return (
                    <div key={p.id} style={{background:"rgba(0,0,0,0.3)",border:"2px solid "+(cant>0?cfgA.color+"44":"rgba(255,255,255,0.06)"),borderRadius:10,padding:"12px"}}>
                      <div style={{fontSize:12,fontWeight:800,color:cfgA.color,marginBottom:6}}>{p.label}</div>
                      {p.factor!==1&&<div style={{fontSize:10,color:"#4a6a7a",marginBottom:6}}>x{p.factor} = {equiv} bultos base</div>}
                      <input style={Object.assign({},INP,{fontSize:20,color:cfgA.color,textAlign:"center"})} type="number" min="0" placeholder="0" value={val}
                        onChange={function(e){setCap(function(prev){var np=Object.assign({},prev.pres);np[areaActual]=Object.assign({},np[areaActual]);np[areaActual][p.id]=e.target.value;return Object.assign({},prev,{pres:np});});}}/>
                    </div>
                  );
                })}
              </div>
              {bultosActual>0&&(
                <div style={{marginTop:12,background:cfgA.color+"18",border:"1px solid "+cfgA.color+"44",borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:14,fontWeight:700,color:cfgA.color}}>Total bultos base</span>
                  <span style={{fontSize:20,fontWeight:900,color:cfgA.color,fontFamily:"Georgia,serif"}}>{bultosActual}</span>
                </div>
              )}
            </div>

            {/* Costos */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"18px"}}>
              <div style={{fontSize:13,fontWeight:900,color:"#38bdf8",textTransform:"uppercase",letterSpacing:2,marginBottom:14}}>Costos del dia</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
                {CONCEPTOS.map(function(c){
                  var val=costosActual[c]||"";
                  var v=nv(val);
                  return (
                    <div key={c}>
                      <label style={LBL}>{c}</label>
                      <input style={Object.assign({},INP,{fontSize:18,color:v>0?"#38bdf8":"#e8e4d8"})} type="number" min="0" step="0.01" placeholder="$0.00" value={val}
                        onChange={function(e){setCap(function(prev){var nc=Object.assign({},prev.costos);nc[areaActual]=Object.assign({},nc[areaActual]);nc[areaActual][c]=e.target.value;return Object.assign({},prev,{costos:nc});});}}/>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Boton guardar */}
            <button onClick={function(){pinReq(guardar);}} disabled={!bultosActual||!costoTotalActual}
              style={{padding:"15px",background:bultosActual&&costoTotalActual?"linear-gradient(135deg,#0369a1,#38bdf8)":"rgba(255,255,255,0.04)",border:"none",borderRadius:12,fontSize:16,fontWeight:900,color:bultosActual&&costoTotalActual?"#fff":"#374151",cursor:bultosActual&&costoTotalActual?"pointer":"default",fontFamily:"system-ui"}}>
              GUARDAR REGISTRO
            </button>
          </div>

          {/* Preview derecha */}
          <div style={{display:"flex",flexDirection:"column",gap:14,marginTop:mob?14:0}}>
            {bultosActual>0&&costoTotalActual>0&&(
              <div style={{background:cfgA.color+"18",border:"3px solid "+cfgA.color+"44",borderRadius:14,padding:"24px",textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:800,color:cfgA.color,marginBottom:12,letterSpacing:2}}>{areaActual.toUpperCase()} - {cap.fecha}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
                  <div style={{background:"rgba(0,0,0,0.3)",borderRadius:10,padding:"14px 8px"}}>
                    <div style={{fontSize:11,color:"#4a6a7a",marginBottom:6}}>BULTOS</div>
                    <div style={{fontSize:32,fontWeight:900,color:cfgA.color,fontFamily:"Georgia,serif"}}>{bultosActual}</div>
                  </div>
                  <div style={{background:"rgba(0,0,0,0.3)",borderRadius:10,padding:"14px 8px"}}>
                    <div style={{fontSize:11,color:"#4a6a7a",marginBottom:6}}>COSTO TOTAL</div>
                    <div style={{fontSize:22,fontWeight:900,color:"#f0f0e8",fontFamily:"Georgia,serif"}}>{fmt(costoTotalActual)}</div>
                  </div>
                  <div style={{background:"rgba(56,189,248,0.12)",border:"2px solid rgba(56,189,248,0.3)",borderRadius:10,padding:"14px 8px"}}>
                    <div style={{fontSize:11,color:"#38bdf8",marginBottom:6}}>COSTO/BULTO</div>
                    <div style={{fontSize:28,fontWeight:900,color:"#38bdf8",fontFamily:"Georgia,serif"}}>{fmt(costoPorBulto)}</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                  {CONCEPTOS.map(function(c){
                    var v=nv(costosActual[c]||0);
                    if(!v)return null;
                    return (
                      <div key={c} style={{background:"rgba(0,0,0,0.25)",borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
                        <div style={{fontSize:10,color:"#4a6a7a"}}>{c}</div>
                        <div style={{fontSize:14,fontWeight:700,color:"#e8e4d8"}}>{fmt(v)}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Resumen hoy */}
            {Object.keys(resumenHoy).length>0&&(
              <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"18px"}}>
                <div style={{fontSize:13,fontWeight:900,color:"#38bdf8",marginBottom:14}}>Registrado hoy</div>
                {Object.keys(resumenHoy).map(function(a){
                  var r=resumenHoy[a];
                  return (
                    <div key={a} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                      <div>
                        <div style={{fontSize:15,fontWeight:800,color:AREAS[a].color}}>{a}</div>
                        <div style={{fontSize:12,color:"#4a6a7a",marginTop:2}}>{r.bultos} bultos . {fmt(r.costo)}</div>
                      </div>
                      <div style={{fontSize:22,fontWeight:900,color:"#38bdf8",fontFamily:"Georgia,serif"}}>{fmt(r.cpb)}<span style={{fontSize:11,color:"#4a6a7a"}}>/bto</span></div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* DASHBOARD */}
      {tab==="dash"&&(
        <div>
          {!registros.length
            ? <div style={{textAlign:"center",padding:80,color:"#374151",fontSize:18,fontWeight:700}}>Sin datos. Registra costos para ver el dashboard.</div>
            : (
              <div>
                {/* Resumen hoy */}
                <div style={{marginBottom:24}}>
                  <div style={{fontSize:14,fontWeight:900,color:"#38bdf8",textTransform:"uppercase",letterSpacing:2,marginBottom:14}}>Resumen de hoy</div>
                  <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(5,1fr)",gap:12}}>
                    {AREA_NAMES.map(function(a){
                      var r=resumenHoy[a];
                      if(!r)return (
                        <div key={a} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:11,padding:"14px",opacity:0.4}}>
                          <div style={{fontSize:14,fontWeight:800,color:AREAS[a].color,marginBottom:8}}>{a}</div>
                          <div style={{fontSize:12,color:"#4a6a7a"}}>Sin registro hoy</div>
                        </div>
                      );
                      return (
                        <div key={a} style={{background:AREAS[a].color+"12",border:"2px solid "+AREAS[a].color+"33",borderRadius:11,padding:"14px"}}>
                          <div style={{fontSize:14,fontWeight:800,color:AREAS[a].color,marginBottom:8}}>{a}</div>
                          <div style={{fontSize:28,fontWeight:900,color:"#38bdf8",fontFamily:"Georgia,serif"}}>{fmt(r.cpb)}</div>
                          <div style={{fontSize:11,color:"#4a6a7a",marginTop:4}}>por bulto</div>
                          <div style={{fontSize:12,color:"#e8e4d8",marginTop:6}}>{r.bultos} btos . {fmt(r.costo)}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Grafica costo por bulto */}
                {ultFechas.length>1&&(
                  <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"20px",marginBottom:20}}>
                    <div style={{fontSize:13,fontWeight:900,color:"#38bdf8",marginBottom:6}}>Costo por bulto - ultimas 2 semanas</div>
                    <div style={{fontSize:11,color:"#4a6a7a",marginBottom:16}}>Tendencia diaria por area</div>
                    {/* Leyenda */}
                    <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
                      {AREA_NAMES.map(function(a){
                        var tieneD=seriesCPB.find(function(s){return s.label===a;});
                        if(!tieneD||!tieneD.datos.some(function(d){return d.v>0;}))return null;
                        return <div key={a} style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:3,background:AREAS[a].color,borderRadius:2}}/><span style={{fontSize:11,color:AREAS[a].color,fontWeight:700}}>{a}</span></div>;
                      })}
                    </div>
                    <LineChart series={seriesCPB.filter(function(s){return s.datos.some(function(d){return d.v>0;});})} height={160} width={700}/>
                  </div>
                )}

                {/* Top defecto del dia - area mas cara */}
                {Object.keys(resumenHoy).length>0&&(function(){
                  var areasHoy=Object.keys(resumenHoy).map(function(a){return{a:a,cpb:resumenHoy[a].cpb};});
                  areasHoy.sort(function(a,b){return b.cpb-a.cpb;});
                  var masC=areasHoy[0]; var menosC=areasHoy[areasHoy.length-1];
                  return (
                    <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:16,marginBottom:20}}>
                      <div style={{background:"rgba(248,113,113,0.08)",border:"2px solid rgba(248,113,113,0.25)",borderRadius:12,padding:"18px"}}>
                        <div style={{fontSize:11,fontWeight:800,color:"#f87171",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Area mas costosa hoy</div>
                        <div style={{fontSize:20,fontWeight:900,color:AREAS[masC.a].color}}>{masC.a}</div>
                        <div style={{fontSize:32,fontWeight:900,color:"#f87171",fontFamily:"Georgia,serif",marginTop:4}}>{fmt(masC.cpb)}<span style={{fontSize:13,color:"#6b7280"}}>/bulto</span></div>
                      </div>
                      <div style={{background:"rgba(74,222,128,0.08)",border:"2px solid rgba(74,222,128,0.25)",borderRadius:12,padding:"18px"}}>
                        <div style={{fontSize:11,fontWeight:800,color:"#4ade80",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Area mas eficiente hoy</div>
                        <div style={{fontSize:20,fontWeight:900,color:AREAS[menosC.a].color}}>{menosC.a}</div>
                        <div style={{fontSize:32,fontWeight:900,color:"#4ade80",fontFamily:"Georgia,serif",marginTop:4}}>{fmt(menosC.cpb)}<span style={{fontSize:13,color:"#6b7280"}}>/bulto</span></div>
                      </div>
                    </div>
                  );
                })()}

                {/* Historial de costo por bulto - tabla */}
                <div style={{background:"rgba(255,255,255,0.04)",border:"2px solid rgba(255,255,255,0.08)",borderRadius:13,padding:"20px"}}>
                  <div style={{fontSize:13,fontWeight:900,color:"#38bdf8",marginBottom:14}}>Historial de costo por bulto por area</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                      <thead>
                        <tr>
                          <th style={{textAlign:"left",padding:"8px 12px",color:"#4a6a7a",fontWeight:700,fontSize:11,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>Fecha</th>
                          {AREA_NAMES.map(function(a){return <th key={a} style={{textAlign:"center",padding:"8px 12px",color:AREAS[a].color,fontWeight:700,fontSize:11,borderBottom:"1px solid rgba(255,255,255,0.08)"}}>{a}</th>;})}
                        </tr>
                      </thead>
                      <tbody>
                        {fechas.slice().reverse().slice(0,30).map(function(f,fi){
                          return (
                            <tr key={f} style={{background:fi%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                              <td style={{padding:"8px 12px",color:"#6b7280",fontWeight:600}}>{f}</td>
                              {AREA_NAMES.map(function(a){
                                var regsA=registros.filter(function(r){return r.fecha===f&&r.area===a;});
                                var totB=regsA.reduce(function(s,r){return s+r.bultos;},0);
                                var totC=regsA.reduce(function(s,r){return s+r.costoTotal;},0);
                                var cpb=totB>0?r2(totC/totB):0;
                                return <td key={a} style={{textAlign:"center",padding:"8px 12px",color:cpb>0?AREAS[a].color:"#374151",fontWeight:cpb>0?700:400}}>{cpb>0?fmt(cpb):"-"}</td>;
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )
          }
        </div>
      )}

      {/* HISTORIAL - una seccion por area */}
      {tab==="hist"&&(
        <div>
          {/* Selector de area */}
          <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
            {AREA_NAMES.map(function(a){
              var sel=fArea===a;
              return (
                <button key={a} onClick={function(){setFArea(sel?"":a);}}
                  style={{padding:"10px 20px",border:"2px solid "+(sel?AREAS[a].color:"rgba(255,255,255,0.1)"),borderRadius:10,background:sel?AREAS[a].color+"18":"transparent",color:sel?AREAS[a].color:"#4a6a7a",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"system-ui"}}>
                  {a}
                </button>
              );
            })}
          </div>

          {(fArea?[fArea]:AREA_NAMES).map(function(a){
            var regsA=registros.filter(function(r){return r.area===a;});
            if(!regsA.length)return null;
            var cfgA2=AREAS[a];
            // Fechas con datos de esta area
            var fechasA=[];
            var fSetA={};
            regsA.forEach(function(r){if(!fSetA[r.fecha]){fSetA[r.fecha]=true;fechasA.push(r.fecha);}});
            fechasA.sort().reverse();
            // Serie para grafica semanal
            var ult14=fechasA.slice().reverse().slice(-14);
            var serieA=ult14.map(function(f){
              var rF=regsA.filter(function(r){return r.fecha===f;});
              var totB=rF.reduce(function(s,r){return s+r.bultos;},0);
              var totC=rF.reduce(function(s,r){return s+r.costoTotal;},0);
              return{label:f.slice(5),v:totB>0?r2(totC/totB):0};
            });
            return (
              <div key={a} style={{background:"rgba(255,255,255,0.04)",border:"2px solid "+cfgA2.color+"33",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
                {/* Header area */}
                <div style={{background:cfgA2.color+"12",borderBottom:"2px solid "+cfgA2.color+"33",padding:"16px 22px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:20,fontWeight:900,color:cfgA2.color}}>{a}</div>
                  <div style={{fontSize:13,color:"#4a6a7a"}}>{fechasA.length} dias registrados</div>
                </div>

                {/* Grafica de comportamiento */}
                {ult14.length>1&&(
                  <div style={{padding:"16px 22px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                    <div style={{fontSize:12,fontWeight:800,color:"#4a6a7a",marginBottom:10}}>COSTO POR BULTO - ULTIMAS 2 SEMANAS</div>
                    <LineChart series={[{label:a,color:cfgA2.color,datos:serieA}]} height={120} width={600}/>
                  </div>
                )}

                {/* Lista de dias */}
                <div style={{padding:"14px 22px"}}>
                  {fechasA.map(function(f,fi){
                    var rF=regsA.filter(function(r){return r.fecha===f;});
                    var totB=rF.reduce(function(s,r){return s+r.bultos;},0);
                    var totC=rF.reduce(function(s,r){return s+r.costoTotal;},0);
                    var cpbF=totB>0?r2(totC/totB):0;
                    var isOpen=openH===a+f;
                    return (
                      <div key={f} style={{borderBottom:"1px solid rgba(255,255,255,0.05)",marginBottom:4}}>
                        <div onClick={function(){setOpenH(isOpen?null:a+f);}}
                          style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",cursor:"pointer"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:15,fontWeight:800,color:"#f0f0e8"}}>{f}</div>
                            <div style={{fontSize:12,color:"#4a6a7a",marginTop:2}}>{totB} bultos . {fmt(totC)}</div>
                          </div>
                          <div style={{fontSize:20,fontWeight:900,color:cfgA2.color,fontFamily:"Georgia,serif"}}>{fmt(cpbF)}<span style={{fontSize:10,color:"#4a6a7a"}}>/bto</span></div>
                          <div style={{fontSize:14,color:"#4a6a7a",minWidth:16}}>{isOpen?"-":"+"}</div>
                        </div>
                        {isOpen&&(
                          <div style={{background:"rgba(0,0,0,0.25)",borderRadius:9,padding:"12px 14px",marginBottom:8}}>
                            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:10}}>
                              {CONCEPTOS.map(function(c){
                                var totC2=rF.reduce(function(s,r){return s+nv(r.costos&&r.costos[c]||0);},0);
                                if(!totC2)return null;
                                return (
                                  <div key={c} style={{background:"rgba(0,0,0,0.3)",borderRadius:7,padding:"8px",textAlign:"center"}}>
                                    <div style={{fontSize:10,color:"#4a6a7a"}}>{c}</div>
                                    <div style={{fontSize:15,fontWeight:700,color:"#e8e4d8"}}>{fmt(totC2)}</div>
                                  </div>
                                );
                              })}
                            </div>
                            {auth&&(
                              <button onClick={function(){pinReq(function(){
                                save(registros.filter(function(r){return !(r.fecha===f&&r.area===a);}));
                              });}}
                                style={{padding:"6px 14px",background:"transparent",border:"1px solid rgba(248,113,113,0.2)",borderRadius:7,color:"#f87171",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"system-ui"}}>
                                Borrar este registro
                              </button>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      </div>
      {showPin&&<ModalPin onOk={function(){pinOk();}} onCancel={function(){setShowPin(false);setPinCb(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
